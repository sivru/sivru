name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build + test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      # We pin pnpm here (not via a `packageManager` field + corepack) so
      # devs with older Node versions don't have to fight stale corepack
      # signing keys. To bump: change `version` here AND in the README.
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      # `pnpm build` runs tsc with emit, which also typechecks. Run it first
      # so dist/ exists for any cross-package imports the typecheck step
      # validates afterwards (e.g. benchmarks → @sivru/search).
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  benchmark-gate:
    name: benchmark gate (perf regression vs baseline)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build
        run: pnpm build

      # Need the pinned corpus for the perf bench. ~130 MB; the action's
      # default cache strips it after the run.
      - name: Fetch corpus
        run: pnpm --filter @sivru/benchmarks fetch-corpus

      # Compares against benchmarks/perf-baseline.json. Tolerances:
      #   chunks    +1%   (deterministic — catches chunker drift)
      #   buildMs   +50%  (CI runners vary 2-3×; only catches blowouts)
      #   peakHeap  +15%  (when baseline >= 4 MiB)
      - name: Perf gate
        run: pnpm --filter @sivru/benchmarks bench:perf:gate
